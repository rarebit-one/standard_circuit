name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    # Pinned to a SHA pre-dating rarebit-one/.github#14 ("drop matrix.ruby
    # template from job name", b47b0b85). #14 renamed the matrix-job from
    # `ci / Ruby 4.0.X` to `ci / test-matrix (4.0.X)`. main's branch
    # protection still requires the old names — pinning restores the
    # expected names so PRs can merge. Unpin (back to `@v1`) once
    # protection is updated to use the new names.
    uses: rarebit-one/.github/.github/workflows/reusable-gem-ci.yml@bf6609f3a294cdac31cd14df9364b7b3c423ebb6 # v1 pre-#14
    with:
      ruby-versions: '["4.0.0","4.0.1","4.0.2","4.0.3","4.0.4"]'
      extra-lint-commands: |
        bundle exec brakeman --no-pager --force
        bundle exec bundler-audit --update
